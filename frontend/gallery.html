<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gallery - Fadila Barber</title>
  <link rel="stylesheet" href="style.css">
  <style>
    /* ===== Gallery Grid ===== */

    .gallery-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
      gap: 15px;
      margin-top: 20px;
    }

    .gallery-item {
      position: relative;
      overflow: hidden;
      border-radius: var(--radius);
      border: 1px solid rgba(212,175,55,0.2);
      cursor: pointer;
    }

    .gallery-item img {
      width: 100%;
      height: 180px;
      object-fit: cover;
      transition: 0.4s ease;
      display: block;
    }

    .gallery-item:hover img {
      transform: scale(1.08);
      filter: brightness(1.1);
    }

    .gallery-item::after {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(
        180deg,
        transparent 60%,
        rgba(0,0,0,0.7) 100%
      );
    }

    /* ===== Modal ===== */

    .modal {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.9);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 999;
    }

    .modal img {
      max-width: 90%;
      max-height: 90%;
      border-radius: var(--radius);
      border: 2px solid var(--gold);
    }

    .modal.active {
      display: flex;
    }

  </style>
</head>

<body>

<header>
  <a href="index.html" class="logo-link">
    <img src="images/logo.png" alt="Fadila Barber Logo" class="logo-img">
  </a>
</header>

<div class="container">

  <main>
    
    <div id="successMessage" class="success-banner"></div>
    <h2 style="text-align:center;color:var(--gold);margin-bottom:20px;">
      גלריית עבודות
    </h2>

    <div class="gallery-grid" id="galleryGrid">
      <!-- Images will load here -->
    </div>

  </main>

</div>

<footer>
  © 2026 Fadila Barber
</footer>

<!-- Modal -->
<div class="modal" id="imageModal" onclick="closeModal()">
  <img id="modalImage">
</div>

<script>
const API_URL = "railway-deploy-production-adc6.up.railway.app/api";
const grid = document.getElementById("galleryGrid");
const modal = document.getElementById("imageModal");
const modalImage = document.getElementById("modalImage");

async function loadGallery() {
  try {
    const res = await fetch(`${API_URL}/gallery`);
    const images = await res.json();

    grid.innerHTML = "";

    images.forEach(img => {
      const div = document.createElement("div");
      div.className = "gallery-item";

      div.innerHTML = `
        <img src="${img.image}" alt="Fadila Barber Work">
      `;

      div.addEventListener("click", () => {
        modalImage.src = img.image;
        modal.classList.add("active");
      });

      grid.appendChild(div);
    });

  } catch (err) {
    console.error("Gallery load error:", err);
  }
}

function closeModal() {
  modal.classList.remove("active");
}

document.addEventListener("DOMContentLoaded", () => {

  const message = localStorage.getItem("bookingSuccess");

  if (message) {
    const banner = document.getElementById("successMessage");
    banner.textContent = message;
    banner.style.display = "block";

    localStorage.removeItem("bookingSuccess");

    setTimeout(() => {
      banner.style.display = "none";
    }, 4000);
  }

  loadGallery();
});
</script>

</body>
</html>
