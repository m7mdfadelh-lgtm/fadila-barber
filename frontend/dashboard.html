<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Owner Dashboard</title>
<style>
:root{--bg:#fff;--card:#fff;--blue:#1769aa;--blue-dark:#0d4f87;--blue-soft:#eaf5ff;--text:#17324d;--muted:#6f879b;--danger:#c62828;--success:#1b7f3a;--border:#cfe4f5;--shadow:0 16px 42px rgba(23,105,170,.18)}
*{box-sizing:border-box}
body{margin:0;font-family:Segoe UI,Arial,sans-serif;background:var(--bg);color:var(--text);padding-right:18px;min-height:100vh}
body::after{content:"";position:fixed;top:0;right:0;width:18px;height:100vh;z-index:2000;background:repeating-linear-gradient(-35deg,#d62828 0 20px,#fff 20px 40px,#1769aa 40px 60px,#fff 60px 80px);box-shadow:-3px 0 12px rgba(23,105,170,.24)}
header{background:#fff;padding:20px 30px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--border);box-shadow:0 5px 18px rgba(23,105,170,.08);position:sticky;top:0;z-index:100}
header h1{margin:0;color:var(--blue-dark)}
.container{padding:28px;max-width:1200px;margin:auto}
section{background:var(--card);padding:24px;margin-bottom:24px;border-radius:18px;border:1px solid var(--border);box-shadow:var(--shadow)}
h2{margin-top:0;color:var(--blue-dark)}
input,select,textarea{padding:11px;margin:5px;border-radius:9px;border:1px solid #bdd6e9;background:#fff;color:var(--text);min-width:150px;outline:none;transition:.2s ease}
input:focus,select:focus,textarea:focus{border-color:var(--blue);box-shadow:0 0 0 4px rgba(23,105,170,.11)}
button{padding:10px 15px;margin:5px;border:0;border-radius:9px;background:linear-gradient(135deg,var(--blue),var(--blue-dark));color:#fff;font-weight:700;cursor:pointer;box-shadow:0 8px 18px rgba(23,105,170,.18);transition:.2s ease}
button:hover{transform:translateY(-1px);box-shadow:0 11px 22px rgba(23,105,170,.26)}
.logout{background:#fff;color:var(--blue);border:1px solid var(--blue);box-shadow:none}
.delete-btn{background:#fff0f0;color:var(--danger);border:1px solid #e6a7a7;box-shadow:none}
.secondary-btn{background:#eef5fa;color:var(--text);border:1px solid #c4d9e8;box-shadow:none}
.form-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:12px;align-items:end}
.form-field{display:flex;flex-direction:column}.form-field label{color:#4f6f89;font-size:13px;margin:0 6px 3px}.form-field input,.form-field select,.form-field textarea{width:100%;margin:0}
.contact-note{color:var(--muted);font-size:13px;margin:8px 5px}
.message{display:none;margin-top:12px;padding:10px;border-radius:8px}.message.success{display:block;background:#effbf2;color:var(--success);border:1px solid #b9e1c2}.message.error{display:block;background:#fff0f0;color:var(--danger);border:1px solid #efb3b3}
.table-wrap{overflow-x:auto;border:1px solid var(--border);border-radius:12px}
table{width:100%;border-collapse:collapse;font-size:14px;background:#fff}th,td{padding:11px;text-align:center;border-bottom:1px solid #e3eef6}th{background:var(--blue-soft);color:var(--blue-dark)}tr:hover{background:#f8fcff}
.appointment-filter{display:flex;flex-wrap:wrap;align-items:end;gap:10px;margin-bottom:16px;padding:14px;border:1px solid var(--border);border-radius:12px;background:#f8fcff}
.appointment-filter .form-field{min-width:210px}.appointment-filter button{margin:0}.appointment-count{margin-inline-start:auto;color:var(--blue-dark);font-weight:700;background:#fff;padding:10px 14px;border:1px solid var(--border);border-radius:9px}
.empty-row td{padding:26px;color:var(--muted);font-weight:600}
#galleryContainer{display:flex;flex-wrap:wrap;gap:14px;margin-top:14px}#galleryContainer div{background:#f8fcff;padding:8px;border-radius:10px;text-align:center;border:1px solid var(--border)}#galleryContainer img{width:140px;height:140px;object-fit:cover;border-radius:7px}
.modal{display:none;position:fixed;inset:0;background:rgba(15,44,68,.55);z-index:1000;padding:20px;overflow:auto}.modal.open{display:flex;align-items:center;justify-content:center}.modal-card{width:min(760px,100%);background:#fff;border:1px solid var(--border);border-radius:18px;padding:24px;box-shadow:0 24px 70px rgba(23,105,170,.28)}.modal-actions{display:flex;justify-content:flex-start;gap:8px;margin-top:16px}
@media(max-width:700px){body{padding-right:12px}body::after{width:12px}header{padding:15px}.container{padding:14px}section{padding:16px;border-radius:14px}input,select,textarea{min-width:0}.appointment-filter{align-items:stretch}.appointment-filter .form-field{width:100%;min-width:0}.appointment-filter button{width:100%}.appointment-count{width:100%;margin:0;text-align:center}}
</style>
</head>
<body>
<header><h1>💈 Owner Dashboard</h1><button class="logout" onclick="logout()">Logout</button></header>
<div class="container">
<section><h2>שעות פעילות</h2><div id="workingHoursContainer"></div><button onclick="saveWorkingHours()">שמור שינויים</button></section>
<section><h2>שירותים</h2><div class="form-grid"><div class="form-field"><label>שם שירות</label><input id="serviceNameInput"></div><div class="form-field"><label>מחיר</label><input id="servicePriceInput" type="number"></div><div class="form-field"><label>משך בדקות</label><input id="serviceDurationInput" type="number" min="1"></div><div><button onclick="addService()">הוסף שירות</button></div></div><div class="table-wrap"><table id="servicesTable"><thead><tr><th>שם</th><th>מחיר</th><th>משך</th><th>מחיקה</th></tr></thead><tbody></tbody></table></div></section>
<section><h2>➕ קביעת תור ידנית</h2><div class="form-grid"><div class="form-field"><label>שם לקוח</label><input id="manualName" placeholder="שם מלא"></div><div class="form-field"><label>טלפון</label><input id="manualPhone" inputmode="tel" placeholder="05XXXXXXXX"></div><div class="form-field"><label>שירות</label><select id="manualService"><option value="">בחר שירות</option></select></div><div class="form-field"><label>תאריך</label><input id="manualDate" type="date"></div><div class="form-field"><label>שעה</label><select id="manualTime"><option value="">בחר תאריך ושירות</option></select></div></div><button id="contactPickerBtn" onclick="pickContact()">📱 בחר מאנשי קשר</button><button onclick="createManualAppointment()">✅ קבע תור</button><div class="contact-note">בחירת אנשי קשר נתמכת בעיקר ב-Chrome/Android.</div><div id="manualMessage" class="message"></div></section>
<section>
<h2>תורים</h2>
<div class="appointment-filter">
<div class="form-field"><label for="appointmentDateFilter">📅 הצג תורים בתאריך</label><input id="appointmentDateFilter" type="date"></div>
<button onclick="filterAppointmentsByDate()">הצג תורים</button>
<button class="secondary-btn" onclick="clearAppointmentDateFilter()">הצג הכל</button>
<div id="appointmentCount" class="appointment-count">0 תורים</div>
</div>
<div class="table-wrap"><table id="appointmentsTable"><thead><tr><th>שם</th><th>טלפון</th><th>שירות</th><th>משך</th><th>תאריך</th><th>שעה</th><th>סטטוס</th><th>פעולות</th></tr></thead><tbody></tbody></table></div>
</section>
<section><h2>גלריה</h2><input type="file" id="imageInput"><button onclick="uploadImage()">העלה</button><div id="galleryContainer"></div></section>
</div>
<div id="editModal" class="modal"><div class="modal-card"><h2>✏️ עריכת תור</h2><input type="hidden" id="editId"><div class="form-grid"><div class="form-field"><label>שם לקוח</label><input id="editName"></div><div class="form-field"><label>טלפון</label><input id="editPhone" inputmode="tel"></div><div class="form-field"><label>שירות</label><select id="editService"></select></div><div class="form-field"><label>משך בדקות</label><input id="editDuration" type="number" min="5" step="5"></div><div class="form-field"><label>תאריך</label><input id="editDate" type="date"></div><div class="form-field"><label>שעה</label><input id="editTime" type="time" step="300"></div><div class="form-field"><label>סטטוס</label><select id="editStatus"><option value="confirmed">מאושר</option><option value="pending">ממתין</option><option value="cancelled">בוטל</option><option value="completed">הושלם</option><option value="no-show">לא הגיע</option></select></div><div class="form-field"><label>הערות</label><textarea id="editNotes" rows="3"></textarea></div></div><div id="editMessage" class="message"></div><div class="modal-actions"><button onclick="saveAppointmentEdit()">💾 שמור</button><button class="secondary-btn" onclick="closeEditModal()">ביטול</button></div></div></div>
<script>
const API_URL='https://railway-deploy-production-adc6.up.railway.app/api';
const token=localStorage.getItem('token');if(!token)location.href='admin.html';
let servicesCache=[];let appointmentsCache=[];
document.addEventListener('DOMContentLoaded',()=>{loadServices();loadAppointments();loadGallery();loadWorkingHours();manualDate.min=new Date().toISOString().split('T')[0];manualDate.addEventListener('change',loadManualSlots);manualService.addEventListener('change',loadManualSlots);appointmentDateFilter.addEventListener('change',filterAppointmentsByDate);if(!('contacts'in navigator))contactPickerBtn.style.display='none'});
async function loadWorkingHours(){const r=await fetch(`${API_URL}/settings`),d=await r.json(),c=workingHoursContainer;c.innerHTML='';const n={sunday:'ראשון',monday:'שני',tuesday:'שלישי',wednesday:'רביעי',thursday:'חמישי',friday:'שישי',saturday:'שבת'};for(const day in d.workingHours){const x=d.workingHours[day];x.breaks=x.breaks||[];let b='';x.breaks.forEach((q,i)=>b+=`<div><input type="time" value="${q.start||''}" id="${day}_breakStart_${i}"> - <input type="time" value="${q.end||''}" id="${day}_breakEnd_${i}"><button onclick="removeBreak('${day}',${i})">❌</button></div>`);c.innerHTML+=`<div style="margin:12px 0;padding:12px;border:1px solid #cfe4f5;border-radius:9px;background:#f8fcff"><strong>${n[day]}</strong><br>פתיחה <input type="time" value="${x.start||''}" id="${day}_start"> סגירה <input type="time" value="${x.end||''}" id="${day}_end"><div id="${day}_breaks">${b}</div><button onclick="addBreak('${day}')">➕ הפסקה</button><label><input type="checkbox" ${x.enabled?'checked':''} id="${day}_enabled"> פתוח</label></div>`}}
async function saveWorkingHours(){const out={};for(const day of ['sunday','monday','tuesday','wednesday','thursday','friday','saturday']){const breaks=[];document.querySelectorAll(`[id^="${day}_breakStart_"]`).forEach(el=>{const i=el.id.split('_').pop();breaks.push({start:el.value,end:document.getElementById(`${day}_breakEnd_${i}`).value})});out[day]={start:document.getElementById(`${day}_start`).value,end:document.getElementById(`${day}_end`).value,breaks,enabled:document.getElementById(`${day}_enabled`).checked}}await fetch(`${API_URL}/settings`,{method:'PUT',headers:{'Content-Type':'application/json',Authorization:`Bearer ${token}`},body:JSON.stringify({workingHours:out})});alert('✅ נשמר בהצלחה')}
function addBreak(day){const c=document.getElementById(`${day}_breaks`),i=Date.now();c.insertAdjacentHTML('beforeend',`<div><input type="time" id="${day}_breakStart_${i}"> - <input type="time" id="${day}_breakEnd_${i}"><button onclick="this.parentElement.remove()">❌</button></div>`)}function removeBreak(day,i){document.getElementById(`${day}_breakStart_${i}`)?.parentElement.remove()}
async function loadServices(){const r=await fetch(`${API_URL}/services`);servicesCache=await r.json();const t=document.querySelector('#servicesTable tbody');t.innerHTML='';manualService.innerHTML='<option value="">בחר שירות</option>';editService.innerHTML='';servicesCache.forEach(s=>{t.innerHTML+=`<tr><td>${escapeHtml(s.name)}</td><td><input id="price_${s._id}" type="number" value="${s.price}" onchange="updateService('${s._id}',this.value,document.getElementById('dur_${s._id}').value)"></td><td><input id="dur_${s._id}" type="number" min="1" value="${s.duration||30}" onchange="updateService('${s._id}',document.getElementById('price_${s._id}').value,this.value)"> דקות</td><td><button class="delete-btn" onclick="deleteService('${s._id}')">❌</button></td></tr>`;manualService.innerHTML+=`<option value="${escapeHtml(s.name)}">${escapeHtml(s.name)} — ${s.duration||30} דקות</option>`;editService.innerHTML+=`<option value="${escapeHtml(s.name)}">${escapeHtml(s.name)}</option>`})}
async function addService(){const p={name:serviceNameInput.value.trim(),price:Number(servicePriceInput.value),duration:Number(serviceDurationInput.value)};if(!p.name||!p.duration)return alert('יש להזין שם ומשך');await fetch(`${API_URL}/services`,{method:'POST',headers:{'Content-Type':'application/json',Authorization:`Bearer ${token}`},body:JSON.stringify(p)});serviceNameInput.value=servicePriceInput.value=serviceDurationInput.value='';loadServices()}
async function updateService(id,price,duration){await fetch(`${API_URL}/services/${id}`,{method:'PUT',headers:{'Content-Type':'application/json',Authorization:`Bearer ${token}`},body:JSON.stringify({price:Number(price),duration:Number(duration)})});loadServices()}async function deleteService(id){if(!confirm('למחוק שירות?'))return;await fetch(`${API_URL}/services/${id}`,{method:'DELETE',headers:{Authorization:`Bearer ${token}`}});loadServices()}
async function pickContact(){try{const l=await navigator.contacts.select(['name','tel'],{multiple:false});if(!l.length)return;manualName.value=(l[0].name&&l[0].name[0])||'';manualPhone.value=normalizeIsraeliPhone((l[0].tel&&l[0].tel[0])||'')}catch(e){showManual('לא ניתן לפתוח אנשי קשר במכשיר זה','error')}}
function normalizeIsraeliPhone(v){let p=String(v).replace(/\D/g,'');if(p.startsWith('972'))p='0'+p.slice(3);return p}
async function loadManualSlots(){const date=manualDate.value,service=manualService.value;manualTime.innerHTML='<option value="">טוען...</option>';if(!date||!service){manualTime.innerHTML='<option value="">בחר תאריך ושירות</option>';return}const r=await fetch(`${API_URL}/appointments/available/${date}?service=${encodeURIComponent(service)}`),d=await r.json();manualTime.innerHTML='<option value="">בחר שעה</option>';for(const t of d.availableSlots||[])manualTime.innerHTML+=`<option value="${t}">${t}</option>`}
async function createManualAppointment(){const p={customerName:manualName.value.trim(),customerPhone:normalizeIsraeliPhone(manualPhone.value),service:manualService.value,date:manualDate.value,time:manualTime.value};if(!p.customerName||!p.customerPhone||!p.service||!p.date||!p.time)return showManual('יש למלא את כל השדות','error');const r=await fetch(`${API_URL}/appointments`,{method:'POST',headers:{'Content-Type':'application/json',Authorization:`Bearer ${token}`},body:JSON.stringify(p)}),d=await r.json();if(!r.ok)return showManual(d.error||'שגיאה בקביעת התור','error');showManual('✅ התור נקבע והודעת WhatsApp נשלחת ללקוח','success');manualName.value=manualPhone.value=manualDate.value='';manualService.value='';manualTime.innerHTML='<option value="">בחר תאריך ושירות</option>';loadAppointments()}
function showManual(text,type){manualMessage.textContent=text;manualMessage.className=`message ${type}`}
function getAppointmentDateKey(appointment){return new Intl.DateTimeFormat('en-CA',{timeZone:'Asia/Jerusalem',year:'numeric',month:'2-digit',day:'2-digit'}).format(new Date(appointment.date))}
function renderAppointments(list){const t=document.querySelector('#appointmentsTable tbody');t.innerHTML='';appointmentCount.textContent=`${list.length} תורים`;if(list.length===0){t.innerHTML='<tr class="empty-row"><td colspan="8">אין תורים בתאריך שנבחר</td></tr>';return}const sorted=[...list].sort((a,b)=>{const dateCompare=getAppointmentDateKey(a).localeCompare(getAppointmentDateKey(b));return dateCompare!==0?dateCompare:String(a.time).localeCompare(String(b.time))});sorted.forEach(a=>t.innerHTML+=`<tr><td>${escapeHtml(a.customerName)}</td><td>${escapeHtml(a.customerPhone)}</td><td>${escapeHtml(a.service)}</td><td>${a.duration||30} דקות</td><td>${new Date(a.date).toLocaleDateString('he-IL',{timeZone:'Asia/Jerusalem'})}</td><td>${a.time}</td><td>${a.status}</td><td><button onclick="openEditModal('${a._id}')">✏️</button><button class="delete-btn" onclick="deleteAppointment('${a._id}')">❌</button></td></tr>`)}
async function loadAppointments(){const r=await fetch(`${API_URL}/appointments`),d=await r.json();appointmentsCache=d.data||[];filterAppointmentsByDate()}
function filterAppointmentsByDate(){const selectedDate=appointmentDateFilter.value;const filtered=selectedDate?appointmentsCache.filter(a=>getAppointmentDateKey(a)===selectedDate):appointmentsCache;renderAppointments(filtered)}
function clearAppointmentDateFilter(){appointmentDateFilter.value='';renderAppointments(appointmentsCache)}
function openEditModal(id){const a=appointmentsCache.find(x=>x._id===id);if(!a)return;editId.value=a._id;editName.value=a.customerName;editPhone.value=a.customerPhone;editService.value=a.service;editDuration.value=a.duration||30;editDate.value=new Intl.DateTimeFormat('en-CA',{timeZone:'Asia/Jerusalem'}).format(new Date(a.date));editTime.value=a.time;editStatus.value=a.status;editNotes.value=a.notes||'';editMessage.className='message';editMessage.textContent='';editModal.classList.add('open')}
function closeEditModal(){editModal.classList.remove('open')}
async function saveAppointmentEdit(){const p={customerName:editName.value.trim(),customerPhone:normalizeIsraeliPhone(editPhone.value),service:editService.value,duration:Number(editDuration.value),date:editDate.value,time:editTime.value,status:editStatus.value,notes:editNotes.value};const r=await fetch(`${API_URL}/appointments/${editId.value}`,{method:'PUT',headers:{'Content-Type':'application/json',Authorization:`Bearer ${token}`},body:JSON.stringify(p)}),d=await r.json();if(!r.ok){editMessage.textContent=d.error||'שגיאה בעדכון התור';editMessage.className='message error';return}editMessage.textContent='✅ התור עודכן';editMessage.className='message success';await loadAppointments();setTimeout(closeEditModal,700)}
async function deleteAppointment(id){if(!confirm('למחוק תור?'))return;await fetch(`${API_URL}/appointments/${id}`,{method:'DELETE',headers:{Authorization:`Bearer ${token}`}});loadAppointments()}
async function loadGallery(){const r=await fetch(`${API_URL}/gallery`),imgs=await r.json();galleryContainer.innerHTML='';imgs.forEach(i=>galleryContainer.innerHTML+=`<div><img src="${i.image}"><br><button class="delete-btn" onclick="deleteImage('${i._id}')">❌ מחק</button></div>`)}async function uploadImage(){const f=imageInput.files[0];if(!f)return;const x=new FormData();x.append('image',f);await fetch(`${API_URL}/gallery`,{method:'POST',headers:{Authorization:`Bearer ${token}`},body:x});loadGallery()}async function deleteImage(id){await fetch(`${API_URL}/gallery/${id}`,{method:'DELETE',headers:{Authorization:`Bearer ${token}`}});loadGallery()}
function escapeHtml(v){return String(v??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[c]))}function logout(){localStorage.removeItem('token');location.href='admin.html'}
</script>
</body>
</html>
